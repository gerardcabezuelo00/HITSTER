<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HITSTER</title>
</head>
<body>

<h1>HITSTER</h1>

<p id="codigo"></p>

<button onclick="reproducir()">Reproducir</button>

<script>
let cancion = "";

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "001";

document.getElementById("codigo").innerText =
"Carta: " + id;

fetch("songs.json")
.then(r => r.json())
.then(data => {
    cancion = data[id];
    console.log("Canción:", cancion);
});

function reproducir() {
    const trackId = cancion.replace("spotify:track:", "");
    window.open(
      "https://open.spotify.com/track/" + trackId,
      "_blank"
    );
}
</script>

</body>
</html>
